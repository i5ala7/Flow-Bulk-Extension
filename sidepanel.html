<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flow Bulk</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1e2128;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #374151;
      --amber: #f59e0b;
      --amber-hover: #d97706;
      --emerald: #10b981;
      --emerald-hover: #059669;
      --red: #ef4444;
      --red-hover: #dc2626;
    }
    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 20px 0;
      text-align: center;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group.flex-grow {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    textarea, select {
      width: 100%;
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    textarea:disabled, select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    textarea {
      resize: vertical;
      flex-grow: 1;
      min-height: 150px;
      line-height: 1.4;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }
    button {
      flex: 1;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    button:active {
      transform: scale(0.98);
    }
    
    /* Specific Button Colors */
    #pauseBtn { background-color: var(--amber); }
    #pauseBtn:hover { background-color: var(--amber-hover); }
    
    #resumeBtn { background-color: var(--emerald); }
    #resumeBtn:hover { background-color: var(--emerald-hover); }
    
    #stopBtn { background-color: var(--red); }
    #stopBtn:hover { background-color: var(--red-hover); }

    #status {
      margin-top: 8px;
      font-size: 13px;
      text-align: center;
      color: var(--text-muted);
      min-height: 20px;
    }
    .progress-section {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
    }
    progress {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border: none;
    }
    progress::-webkit-progress-bar {
      background-color: var(--border);
      border-radius: 4px;
    }
    progress::-webkit-progress-value {
      background-color: var(--primary);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <h1>Flow Bulk Generator</h1>
  
  <div class="form-group flex-grow">
    <label for="prompts">Prompts (one per line)</label>
    <textarea id="prompts" placeholder="A futuristic city at night...&#10;A cute cat playing with yarn..."></textarea>
  </div>
  
  <div class="form-group">
    <label for="model">Model</label>
    <select id="model">
      <option value="Nano Banana Pro">Nano Banana Pro</option>
      <option value="Nano Banana 2" selected>Nano Banana 2</option>
      <option value="Imagen 4">Imagen 4</option>
    </select>
  </div>

  <div class="form-group">
    <label for="aspectRatio">Aspect Ratio</label>
    <select id="aspectRatio">
      <option value="SQUARE">Square (1:1)</option>
      <option value="LANDSCAPE" selected>Landscape</option>
      <option value="PORTRAIT">Portrait</option>
    </select>
  </div>
  
  <div class="form-group">
    <label for="concurrentCount">Concurrent Batch Size</label>
    <select id="concurrentCount">
      <option value="1">1 (Sequential)</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5" selected>5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
    </select>
  </div>
  
  <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
    <input type="checkbox" id="resumeLast" style="width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary);">
    <label for="resumeLast" style="margin-bottom: 0; cursor: pointer; user-select: none;">Resume from last downloaded image</label>
  </div>
  
  <div class="controls">
    <button id="startBtn">Start Generation</button>
    <button id="pauseBtn" style="display:none;">Pause</button>
    <button id="resumeBtn" style="display:none;">Resume</button>
    <button id="stopBtn" style="display:none;">Stop</button>
  </div>
  
  <div class="controls" style="margin-top: 10px;">
    <button id="retryBtn" style="display:none; background-color: var(--amber);">Retry Failed</button>
  </div>
  
  <div class="progress-section">
    <div class="progress-stats">
      <span id="promptCount">0 Prompts</span>
      <span>
        <span id="successCount" style="color: var(--emerald); margin-right: 8px;">0 ✓</span>
        <span id="failCount" style="color: var(--red);">0 ✗</span>
      </span>
    </div>
    <progress id="progressBar" value="0" max="100"></progress>
    <div id="status">Ready</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
